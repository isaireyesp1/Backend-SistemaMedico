# ==========================
# Aplicación
# ==========================
spring.application.name=SisMedico

# ==========================
# Base de datos MySQL
# ==========================
spring.datasource.url=jdbc:mysql://localhost:3306/sismedico?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================
# JPA
# ==========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================
# Jackson
# ==========================
spring.jackson.serialization.write-dates-as-timestamps=false

# ==========================
# Subida de archivos
# ==========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# ==========================
# Correo
# ==========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=tu_correo@gmail.com
spring.mail.password=tu_password_de_aplicacion
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==========================
# Puerto
# ==========================
server.port=8080

# ==========================
# JWT
# ==========================
jwt.secret=5dF4@7kLp9#Qx2Vm8!Na3Bc6Ds1EfGh7
jwt.expiration=86400000



# ==========================
# Logs
# ==========================
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG


# ============================
# Swagger / OpenAPI
# ============================

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

springdoc.swagger-ui.path=/swagger-ui.html

springdoc.api-docs.path=/api-docs

springdoc.packages-to-scan=com.example.sismedico.controller

springdoc.paths-to-match=/api/**